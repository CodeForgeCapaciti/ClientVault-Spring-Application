apiVersion: apps/v1
kind: Deployment
metadata:
  name: clientvault-app
  namespace: clientvault
  labels:
    app: clientvault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clientvault
  template:
    metadata:
      labels:
        app: clientvault
      annotations:  # <<< ADD THESE ANNOTATIONS FOR PROMETHEUS
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: clientvault-container
          image: durksie/clientvault-app:latest
          ports:
            - containerPort: 8080
              name: http  # <<< ADD NAME FOR THE PORT (important for ServiceMonitor)
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_JPA_HIBERNATE_DDL_AUTO
            - name: SPRING_JPA_SHOW_SQL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_JPA_SHOW_SQL
            # <<< ADD THESE ENV VARIABLES FOR ACTUATOR METRICS
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus"
            - name: MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED
              value: "true"
            - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"